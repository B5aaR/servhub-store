<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ServHub — Linux App Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08080f;
      --surface: #0c0c18;
      --card: #141422;
      --card-hover: #1c1c30;
      --border: rgba(255,255,255,0.07);
      --border-subtle: rgba(255,255,255,0.05);
      --accent: #7c6aff;
      --accent2: #00e5c0;
      --text: #dcdcf0;
      --text-dim: #6060a0;
      --text-muted: #3a3a60;
      --font-head: 'Syne', sans-serif;
      --font-body: 'Manrope', sans-serif;
    }

    html, body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: .35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
    scrollbar-width: thin; scrollbar-color: var(--accent) var(--surface);

    @keyframes logo-in   { from { opacity:0; transform:translateX(-10px) } to { opacity:1; transform:none } }
    @keyframes header-in { from { opacity:0; transform:translateY(-6px)  } to { opacity:1; transform:none } }
    @keyframes fade-up   { from { opacity:0; transform:translateY(14px)  } to { opacity:1; transform:none } }
    @keyframes fade-in   { from { opacity:0 } to { opacity:1 } }
    @keyframes spin      { to   { transform: rotate(360deg) } }
    @keyframes shimmer   { 0% { background-position:-500px 0 } 100% { background-position:500px 0 } }
    @keyframes pulse-teal {
      0%   { box-shadow: 0 0 0 0 rgba(0,229,192,.45) }
      70%  { box-shadow: 0 0 0 8px rgba(0,229,192,0) }
      100% { box-shadow: 0 0 0 0 rgba(0,229,192,0)   }
    }

    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 220px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border-subtle);
      display: flex; flex-direction: column;
      padding: 28px 0 20px;
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
    }
    .sidebar-logo { display:flex; align-items:center; gap:10px; padding:0 20px 28px; animation:logo-in .45s ease both; }
    .logo-mark {
      width:36px; height:36px; border-radius:10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      box-shadow: 0 4px 14px rgba(124,106,255,.4);
    }
    .logo-text { font-family:var(--font-head); font-size:19px; font-weight:800; color:#e8e8f8; letter-spacing:-.02em; }
    .logo-text span { color: var(--accent); }

    .sidebar-label {
      font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
      color: var(--text-muted); padding: 0 20px 8px; margin-top: 8px;
    }
    .sidebar-hr { height:1px; background: var(--border-subtle); margin: 10px 20px; }

    .nav-btn {
      display:flex; align-items:center; gap:11px; padding:10px 20px;
      font-family:var(--font-body); font-size:14px; font-weight:500; color:var(--text-dim);
      border:none; background:none; width:100%; text-align:left; cursor:pointer;
      transition: color .15s, background .15s; position:relative; user-select:none;
    }
    .nav-btn:hover { color:#a0a0c8; background:rgba(255,255,255,.03); }
    .nav-btn.active { color:var(--text); background:rgba(124,106,255,.1); }
    .nav-btn.active::before {
      content:''; position:absolute; left:0; top:6px; bottom:6px; width:3px;
      background: linear-gradient(to bottom, var(--accent), var(--accent2)); border-radius:0 3px 3px 0;
    }
    .nav-btn .nav-icon { opacity:.6; transition:opacity .15s; flex-shrink:0; }
    .nav-btn.active .nav-icon, .nav-btn:hover .nav-icon { opacity:1; }
    .nav-badge {
      margin-left:auto; background:rgba(0,229,192,.15); color:var(--accent2);
      font-size:11px; font-weight:700; padding:1px 8px; border-radius:20px;
      border:1px solid rgba(0,229,192,.25);
    }
    .nav-btn.active .nav-badge { background:rgba(0,229,192,.25); }

    .sidebar-footer { margin-top:auto; padding:0 20px; font-size:11px; color:#2a2a48; line-height:1.6; }

    .main { flex:1; display:flex; flex-direction:column; min-width:0; }

    .topbar {
      position:sticky; top:0; z-index:10;
      background: rgba(8,8,15,.9); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
      border-bottom: 1px solid var(--border-subtle);
      padding: 14px 32px;
      display:flex; align-items:center; justify-content:space-between; gap:24px;
      animation: header-in .4s ease both;
    }
    .topbar-left { display:flex; flex-direction:column; gap:2px; }
    .topbar-title { font-family:var(--font-head); font-size:22px; font-weight:800; color:#e8e8f8; letter-spacing:-.02em; line-height:1; }
    .topbar-sub { font-size:12px; color:var(--text-muted); font-weight:500; }

    .lib-banner {
      margin: 0 32px 24px;
      padding: 16px 20px;
      background: linear-gradient(135deg, rgba(0,229,192,.07), rgba(124,106,255,.07));
      border: 1px solid rgba(0,229,192,.15); border-radius:14px;
      display:flex; align-items:center; gap:14px;
      animation: fade-in .4s ease both;
    }
    .lib-banner-icon {
      width:40px; height:40px; border-radius:10px; flex-shrink:0;
      background: linear-gradient(135deg,rgba(0,229,192,.2),rgba(124,106,255,.2));
      display:flex; align-items:center; justify-content:center;
    }
    .lib-banner h3 { font-family:var(--font-head); font-size:14px; font-weight:700; color:#e8e8f8; margin-bottom:2px; }
    .lib-banner p  { font-size:12px; color:var(--text-dim); }

    .content { flex:1; padding:32px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px; width: 100%;
    }

    .load-more-wrap { grid-column:1/-1; display:flex; justify-content:center; padding:8px 0 4px; }
    .load-more-btn {
      padding: 11px 36px; border-radius:12px;
      background: rgba(124,106,255,.1); color:var(--accent);
      border: 1px solid rgba(124,106,255,.25);
      font-family:var(--font-body); font-size:14px; font-weight:700;
      cursor:pointer; transition: all .2s;
    }
    .load-more-btn:hover { background: var(--accent); color:#fff; box-shadow:0 4px 20px rgba(124,106,255,.35); }

    .grid-empty {
      grid-column:1/-1; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:80px 20px; gap:14px;
    }
    .grid-empty-title { font-family:var(--font-head); font-size:18px; font-weight:700; color:var(--text-dim); }
    .grid-empty-sub   { font-size:13px; color:var(--text-muted); }

    .app-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:18px; padding:20px;
      display:flex; flex-direction:column; gap:10px;
      transition: transform .2s cubic-bezier(.34,1.56,.64,1), border-color .2s, box-shadow .2s, background .2s;
      animation: fade-up .35s ease both;
      position:relative; overflow:hidden;
    }
    .app-card::before {
      content:''; position:absolute; inset:0;
      background: radial-gradient(ellipse at top left, rgba(124,106,255,.08) 0%, transparent 60%);
      opacity:0; transition:opacity .25s; pointer-events:none;
    }
    .app-card:hover { transform:translateY(-4px); border-color:rgba(124,106,255,.3); background:var(--card-hover); box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 0 1px rgba(124,106,255,.15); }
    .app-card:hover::before { opacity:1; }
    .app-card.installed { border-color:rgba(0,229,192,.2); }
    .app-card.installed::after { content:''; position:absolute; top:14px; right:14px; width:7px; height:7px; border-radius:50%; background:var(--accent2); box-shadow:0 0 6px var(--accent2); }

    .card-header { display:flex; align-items:center; gap:14px; }
    .card-icon { width:56px; height:56px; border-radius:14px; object-fit:cover; flex-shrink:0; border:1px solid var(--border); background:var(--bg); display:block; }
    .card-icon-fb {
      width:56px; height:56px; border-radius:14px; flex-shrink:0;
      background: linear-gradient(135deg,#1e1e38,#2a2a50); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-head); font-size:22px; font-weight:700; color:var(--accent);
    }
    .card-meta { flex:1; min-width:0; }
    .card-name { font-family:var(--font-head); font-size:15px; font-weight:700; color:#e8e8f8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:3px; }
    .card-cat { font-size:11px; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:.08em; background:rgba(124,106,255,.12); padding:2px 8px; border-radius:20px; display:inline-block; }
    .card-summary { font-size:13px; color:var(--text-dim); line-height:1.55; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .card-footer { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:2px; }
    .card-size { font-size:12px; color:var(--text-muted); font-weight:500; white-space:nowrap; }
    .installed-badge { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--accent2); }

    .btn {
      padding:9px 18px; border-radius:10px; border:none;
      font-family:var(--font-body); font-size:13px; font-weight:700;
      cursor:pointer; transition:all .18s;
      display:flex; align-items:center; gap:7px;
      white-space:nowrap; flex-shrink:0;
    }
    .btn:disabled { pointer-events:none; }
    .btn-install  { background:rgba(124,106,255,.15); color:var(--accent); border:1px solid rgba(124,106,255,.3); }
    .btn-install:hover  { background:var(--accent); color:#fff; box-shadow:0 4px 18px rgba(124,106,255,.4); transform:scale(1.04); }
    .btn-working  { background:rgba(255,255,255,.05); color:var(--text-dim); border:1px solid var(--border-subtle); cursor:default; }
    .btn-done     { background:rgba(0,229,192,.12); color:var(--accent2); border:1px solid rgba(0,229,192,.25); cursor:default; animation:pulse-teal 1s ease-out; }
    .btn-remove   { background:rgba(255,80,80,.08); color:#ff6b6b; border:1px solid rgba(255,80,80,.2); }
    .btn-remove:hover   { background:rgba(255,80,80,.18); box-shadow:0 4px 14px rgba(255,80,80,.2); }
    .btn-retry    { background:rgba(255,180,0,.1); color:#ffb400; border:1px solid rgba(255,180,0,.25); }
    .btn-retry:hover    { background:rgba(255,180,0,.2); }

    .spinner { width:13px; height:13px; border:2px solid rgba(255,255,255,.12); border-top-color:currentColor; border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }

    .sk-card { background:var(--card); border:1px solid var(--border-subtle); border-radius:18px; padding:20px; display:flex; flex-direction:column; gap:12px; animation:fade-up .35s ease both; }
    .sk { background:linear-gradient(90deg,#1a1a28 25%,#222238 50%,#1a1a28 75%); background-size:800px 100%; animation:shimmer 1.6s infinite linear; border-radius:8px; }

    .searchbar-wrap { position:relative; width:100%; max-width:560px; }
    .searchbar-inner {
      display:flex; align-items:center; gap:12px;
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
      border-radius:14px; padding:0 16px;
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    .searchbar-inner:focus-within { border-color:rgba(124,106,255,.5); background:rgba(124,106,255,.06); box-shadow:0 0 0 3px rgba(124,106,255,.12),0 8px 32px rgba(0,0,0,.4); }
    .searchbar-icon { color:var(--text-muted); flex-shrink:0; transition:color .2s; }
    .searchbar-inner:focus-within .searchbar-icon { color:var(--accent); }
    .searchbar-input { flex:1; background:transparent; border:none; outline:none; font-family:var(--font-body); font-size:15px; font-weight:500; color:var(--text); padding:14px 0; caret-color:var(--accent); }
    .searchbar-input::placeholder { color:#4a4a72; }
    .searchbar-kbd { display:flex; align-items:center; gap:4px; opacity:.5; transition:opacity .2s; flex-shrink:0; }
    .searchbar-inner:focus-within .searchbar-kbd { opacity:0; }
    .kbd { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:5px; padding:2px 6px; font-size:11px; font-weight:600; color:var(--text-muted); }
    .searchbar-clear { background:none; border:none; cursor:pointer; color:var(--text-muted); display:flex; align-items:center; padding:4px; border-radius:6px; transition:color .2s,background .2s; flex-shrink:0; }
    .searchbar-clear:hover { color:var(--text); background:rgba(255,255,255,.07); }
    .searchbar-count { position:absolute; bottom:-24px; left:4px; font-size:12px; color:var(--text-muted); font-weight:500; }

    @media (max-width:768px) {
      .sidebar { display:none; }
      .topbar  { padding:12px 16px; }
      .content { padding:16px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
